<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#060b10" />
    <title>Chart Sniper</title>
    <style>
      html, body, #root { height: 100%; margin: 0; background: #060b10; }
      body { -webkit-font-smoothing: antialiased; }
      @keyframes pulse { 0%,100%{opacity:.4;transform:scale(1);} 50%{opacity:1;transform:scale(1.2);} }
      @keyframes levelup { 0%{transform:scale(.6);opacity:0;} 50%{transform:scale(1.1);opacity:1;} 100%{transform:scale(1);opacity:1;} }
      *::-webkit-scrollbar { width: 6px; height: 6px; }
      *::-webkit-scrollbar-thumb { background: #1a2d3d; border-radius: 3px; }
      button:active { transform: scale(0.97); }
      button { transition: transform 0.08s ease, opacity 0.15s, background 0.15s; }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
